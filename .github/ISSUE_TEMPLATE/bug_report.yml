# Based on templates from:
# https://github.com/hoo-dles/morphe-patches
# Modified for this repository.
name: 🐞 Bug report
description: Report a bug or an issue.
title: 'bug: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        # Bug Report

        Before creating a new bug report, please keep the following in mind:

        - **Do not submit a duplicate bug report.** Search for existing bug reports [here](https://github.com/rushiranpise/morphe-patches/issues?q=label%3A%22bug%22).
        - **Do not use the issue page for support.** If you need help or have questions, please visit the [official reddit](https://www.reddit.com/r/MorpheApp) or create a new [Q&A discussion](https://github.com/rushiranpise/morphe-patches/discussions/new?category=q-a).
  - type: textarea
    attributes:
      label: Bug description
      description: |
        - Describe your bug in detail
        - Add steps to reproduce the bug if possible (Step 1. ... Step 2. ...)
        - Add images and videos if possible
    validations:
      required: true
  - type: input
    attributes:
      label: App name
      placeholder: 'Duolingo, Prime Video, MyFitnessPal, etc'
    validations:
      required: true
  - type: input
    attributes:
      label: App version
      description: 'Please provide the version of the app that is causing the issue.'
      placeholder: '1.23.456'
    validations:
      required: true
  - type: input
    attributes:
      label: Manager or CLI version
      description: 'Please provide the version of the Morphe Manager or Morphe CLI used.'
      placeholder: 'Manager v1.12.0'
    validations:
      required: true
  - type: input
    attributes:
      label: Patch release version
      description: 'Required: provide the Morphe patch release channel and build number used to create the patched APK.'
      placeholder: 'stable v1.8.0 or dev v1.8.0-dev.3'
    validations:
      required: true
  - type: textarea
    attributes:
      label: Error logs
      description: 'Required: paste the relevant patching or runtime logs. See the README for how to capture logs: https://github.com/rushiranpise/morphe-patches#capture-logs'
      render: shell
    validations:
      required: true
  - type: textarea
    attributes:
      label: Solution
      description: If applicable, add a possible solution to the bug.
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your bug report will be closed if you don't follow the checklist below.
      options:
        - label: I have checked all open and closed bug reports and this is not a duplicate.
          required: true
        - label: I have chosen an appropriate title.
          required: true
        - label: All requested information has been provided properly.
          required: true
